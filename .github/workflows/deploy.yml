name: Deploy Tailwind Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'        # Node LTS corrente — elimina i warning
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: |
          ./node_modules/.bin/tailwindcss \
            --config ./tailwind.config.js \
            -i ./docs/assets/css/input.css \
            -o ./docs/assets/css/output.css \
            --minify

      - name: Verify build output
        run: |
          if [ ! -f ./docs/assets/css/output.css ]; then
            echo "❌ ERRORE: output.css non trovato"
            exit 1
          fi
          BYTES=$(wc -c < ./docs/assets/css/output.css)
          echo "✅ output.css: ${BYTES} bytes"
          if [ "$BYTES" -lt 1000 ]; then
            echo "⚠️  WARNING: file troppo piccolo — verifica tailwind.config.js content paths"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.call-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: call-deploy
        uses: actions/deploy-pages@v4
